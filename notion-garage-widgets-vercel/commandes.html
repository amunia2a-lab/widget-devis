<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Commandes de pièces</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="nav">
    <a href="/devis">📄 Devis clients</a>
    <a href="/commandes">📦 Commandes de pièces</a>
  </div>
  <div class="page">
    <section class="widget">
      <div class="header">
        <div class="title-wrap">
          <div class="title-icon">📄</div>
          <div class="title">Commandes de pièces</div>
        </div>
        <div class="counters" id="commandeCounters"></div>
      </div>
      <div class="table-head">
        <div class="label">🔢 Immat</div>
        <div class="label">🚗 Véhicule</div>
        <div class="label">👤 Client</div>
        <div class="label">🔧 Intervention</div>
        <div class="label">🏭 Fournisseur</div>
        <div class="label">📅 Date commande</div>
        <div class="label">📌 Statut</div>
      </div>
      <div class="rows" id="commandeRows"></div>
      <div class="form-card">
        <div class="form-grid">
          <div class="field"><label>🔢 Immatriculation</label><input id="c-immat" placeholder="AB-123-CD"></div>
          <div class="field"><label>🚗 Véhicule</label><input id="c-vehicule" placeholder="Peugeot 208"></div>
          <div class="field"><label>👤 Client</label><input id="c-client" placeholder="Martin"></div>
          <div class="field"><label>🔧 Intervention</label><input id="c-intervention" placeholder="Embrayage"></div>
        </div>
        <div class="form-bottom">
          <div class="field"><label>🏭 Fournisseur</label><input id="c-fournisseur" placeholder="MecaPièces"></div>
          <div class="field"><label>📅 Date commande</label><input id="c-date" type="date"></div>
          <div class="field"><label>📌 Statut</label><select id="c-statut"><option>À commander</option><option>Commandé</option><option>Reçu</option></select></div>
          <button class="primary" id="createCommandeBtn">Ajouter</button>
        </div>
      </div>
      <div class="footer-note" id="commandeFooter"></div>
    </section>
  </div>
  <script>
    const badgeClass = (status) => status === 'Reçu' ? 'green' : status === 'Commandé' ? 'blue' : 'yellow';

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function loadCommandes() {
      const res = await fetch('/api/commandes');
      const commandes = await res.json();
      document.getElementById('commandeRows').innerHTML = commandes.map(c => `
        <div class="row">
          <div>${escapeHtml(c.immat || '')}</div>
          <div>${escapeHtml(c.vehicule || '')}</div>
          <div>${escapeHtml(c.client || '')}</div>
          <div><span class="badge ${badgeClass(c.statut)}">${escapeHtml(c.intervention || '')}</span></div>
          <div>${escapeHtml(c.fournisseur || '')}</div>
          <div>${c.dateCommande ? new Date(c.dateCommande).toLocaleDateString('fr-FR') : ''}</div>
          <div><span class="badge ${badgeClass(c.statut)}">${escapeHtml(c.statut || '')}</span></div>
        </div>`).join('');

      const aCommander = commandes.filter(x => x.statut === 'À commander').length;
      const commande = commandes.filter(x => x.statut === 'Commandé').length;
      const recu = commandes.filter(x => x.statut === 'Reçu').length;
      document.getElementById('commandeCounters').innerHTML = `
        <div class="counter"><span class="dot yellow"></span>${aCommander}</div>
        <div class="counter"><span class="dot blue"></span>${commande}</div>
        <div class="counter"><span class="dot green"></span>${recu}</div>`;
      document.getElementById('commandeFooter').innerHTML = `${commandes.length} commandes <span class="green-dot">•</span> Mise à jour en temps réel`;
    }

    document.getElementById('createCommandeBtn').addEventListener('click', async () => {
      const payload = {
        immat: document.getElementById('c-immat').value,
        vehicule: document.getElementById('c-vehicule').value,
        client: document.getElementById('c-client').value,
        intervention: document.getElementById('c-intervention').value,
        fournisseur: document.getElementById('c-fournisseur').value,
        dateCommande: document.getElementById('c-date').value || null,
        statut: document.getElementById('c-statut').value
      };
      const res = await fetch('/api/commandes', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
      });
      if (!res.ok) return alert('Erreur création commande');
      document.querySelectorAll('input').forEach(i => i.value = '');
      document.getElementById('c-statut').value = 'À commander';
      await loadCommandes();
    });

    loadCommandes();
  </script>
</body>
</html>
