<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commandes clients</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <main class="shell">
    <section class="panel">
      <header class="panel-header">
        <div class="title-wrap">
          <div class="title-icon">👥</div>
          <h1>Commandes clients</h1>
        </div>
        <div class="stats">
          <div class="stat yellow"><span class="dot"></span><span id="count-todo">0</span></div>
          <div class="stat blue"><span class="dot"></span><span id="count-sent">0</span></div>
          <div class="stat green"><span class="dot"></span><span id="count-done">0</span></div>
        </div>
      </header>

      <div id="toast" class="toast hidden">Demande de pièces envoyée avec succès.</div>

      <section id="rows" class="rows"></section>

      <div class="live-line"><strong id="count-total">0</strong> commandes <span class="live-dot"></span> Mise à jour en temps réel</div>

      <form id="quick-form" class="quick-form">
        <div class="form-grid">
          <label>
            <span>Immatriculation</span>
            <input id="immat" placeholder="AB-123-CD" />
          </label>
          <label>
            <span>Véhicule</span>
            <input id="vehicule" placeholder="Ex : Peugeot 208" />
          </label>
          <label>
            <span>Client</span>
            <input id="client" placeholder="Ex : Martin" />
          </label>
          <label>
            <span>Intervention</span>
            <input id="intervention" placeholder="Ex : Embrayage, Distribution" />
          </label>

          <label>
            <span>Fournisseur</span>
            <input id="fournisseur" placeholder="Sélectionner..." />
          </label>
          <label>
            <span>Date</span>
            <input id="dateCommande" type="date" />
          </label>
          <label>
            <span>Statut</span>
            <select id="statut">
              <option>À commander</option>
              <option>Commandé</option>
              <option>Reçu</option>
            </select>
          </label>
          <button class="primary-btn" type="submit">+ Ajouter</button>
        </div>
      </form>
    </section>
  </main>

<script>
const rowsEl = document.getElementById('rows');
const toastEl = document.getElementById('toast');

function showToast(message) {
  toastEl.textContent = message;
  toastEl.classList.remove('hidden');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => toastEl.classList.add('hidden'), 2600);
}

function statusClass(statut='') {
  if (statut === 'À commander') return 'yellow';
  if (statut === 'Commandé') return 'blue';
  if (statut === 'Reçu') return 'green';
  return 'yellow';
}

function renderStats(items) {
  const todo = items.filter(i => i.statut === 'À commander').length;
  const sent = items.filter(i => i.statut === 'Commandé').length;
  const done = items.filter(i => i.statut === 'Reçu').length;
  document.getElementById('count-todo').textContent = todo;
  document.getElementById('count-sent').textContent = sent;
  document.getElementById('count-done').textContent = done;
  document.getElementById('count-total').textContent = items.length;
}

async function loadRows() {
  const [devisRes, commandesRes] = await Promise.all([
    fetch('/api/devis'),
    fetch('/api/commandes')
  ]);

  const devis = devisRes.ok ? await devisRes.json() : [];
  const commandes = commandesRes.ok ? await commandesRes.json() : [];

  const sentImmat = new Set(commandes.map(c => c.immat).filter(Boolean));
  const rows = devis.map(d => ({
    id: d.id,
    client: d.client || '',
    vehicule: d.vehicule || '',
    intervention: d.intervention || '',
    phone: d.telephone || '',
    mail: d.mail || '',
    immat: d.immat || '',
    photo: d.photo || '',
    statut: sentImmat.has(d.immat) ? 'Commandé' : 'À commander',
    isInPieces: sentImmat.has(d.immat)
  }));

  rowsEl.innerHTML = '';
  renderStats(rows);

  rows.forEach(item => {
    const row = document.createElement('article');
    row.className = 'row-card';
    row.innerHTML = `
      <div class="thumb-wrap">
        ${item.photo ? `<img class="thumb" src="${item.photo}" alt="Photo">` : `<div class="thumb-empty">Photo</div>`}
      </div>

      <div class="row-main">
        <div class="line-1">
          <div class="client-line">
            <strong>${item.client}</strong>
            <span class="sep">•</span>
            <span>${item.vehicule}</span>
            <span class="sep">•</span>
            <span>${item.intervention}</span>
          </div>
          <div class="row-actions">
            <button class="ghost-btn details-btn" type="button">Voir détails</button>
            <button class="secondary-btn piece-btn ${item.isInPieces ? 'is-blue' : 'is-yellow'}" type="button">
              ${item.isInPieces ? 'Afficher en pièces' : 'Demander pièces'}
            </button>
          </div>
        </div>

        <div class="line-2">
          <span class="pill ${statusClass(item.statut)}">${item.statut}</span>
          <span class="meta">${item.phone ? '📞 ' + item.phone : ''}</span>
          <span class="meta">${item.mail ? '✉ ' + item.mail : ''}</span>
        </div>
      </div>
    `;

    const pieceBtn = row.querySelector('.piece-btn');
    if (item.isInPieces) {
      pieceBtn.addEventListener('click', () => window.location.href = '/commandes.html');
    } else {
      pieceBtn.addEventListener('click', async () => {
        pieceBtn.disabled = true;
        try {
          const res = await fetch(`/api/devis/${item.id}/create-piece-order`, { method: 'POST' });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Erreur');
          showToast('Demande de pièces envoyée avec succès.');
          await loadRows();
        } catch (e) {
          showToast(e.message || "Impossible d'envoyer la demande.");
          pieceBtn.disabled = false;
        }
      });
    }

    rowsEl.appendChild(row);
  });
}

document.getElementById('quick-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const payload = {
    immat: document.getElementById('immat').value.trim(),
    vehicule: document.getElementById('vehicule').value.trim(),
    client: document.getElementById('client').value.trim(),
    intervention: document.getElementById('intervention').value.trim(),
    fournisseur: document.getElementById('fournisseur').value.trim(),
    dateCommande: document.getElementById('dateCommande').value || null,
    statut: document.getElementById('statut').value
  };

  const res = await fetch('/api/commandes', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
  const data = await res.json();
  if (!res.ok) {
    showToast(data.error || "Impossible d'ajouter.");
    return;
  }
  e.target.reset();
  showToast('Commande ajoutée avec succès.');
  await loadRows();
});

loadRows().catch(err => {
  rowsEl.innerHTML = '<p class="error">Impossible de charger les données.</p>';
  console.error(err);
});
</script>
</body>
</html>
