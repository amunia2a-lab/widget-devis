<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devis clients</title>
<link rel="stylesheet" href="/styles.css">
</head>

<body>
<main class="shell">
<section class="panel">

<header class="panel-header">
  <h1>Devis clients</h1>
</header>

<section id="rows" class="rows"></section>

<form class="quick-form">

<div class="form-grid">

<div class="action-box">
  <label for="photoUrl" class="action-content">
    <span class="icon">🔗</span>
    <span class="label">Ajouter URL</span>
  </label>
  <input id="photoUrl" class="hidden-input">
</div>

<div class="action-box">
  <label for="photos" class="action-content">
    <span class="icon">📷</span>
    <span class="label">Ajouter photo</span>
  </label>
  <input id="photos" type="file" multiple hidden>
</div>

<button class="primary-btn">+ Ajouter</button>

</div>

</form>

</section>
</main>
</body>
</html>
