<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Devis clients</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="nav">
    <a href="/devis">📄 Devis clients</a>
    <a href="/commandes">📦 Commandes de pièces</a>
  </div>
  <div class="page">
    <section class="widget">
      <div class="header">
        <div class="title-wrap">
          <div class="title-icon">📄</div>
          <div class="title">Devis clients</div>
        </div>
        <div class="counters" id="devisCounters"></div>
      </div>
      <div class="table-head">
        <div class="label">🔢 Immat</div>
        <div class="label">🚗 Véhicule</div>
        <div class="label">👤 Client</div>
        <div class="label">🔧 Intervention</div>
        <div class="label">📌 Statut</div>
        <div class="label">📦 Commande pièce</div>
        <div class="label">⚡ Action</div>
      </div>
      <div class="rows" id="devisRows"></div>
      <div class="form-card">
        <div class="form-grid">
          <div class="field"><label>🔢 Immatriculation</label><input id="d-immat" placeholder="AB-123-CD"></div>
          <div class="field"><label>🚗 Véhicule</label><input id="d-vehicule" placeholder="Peugeot 208"></div>
          <div class="field"><label>👤 Client</label><input id="d-client" placeholder="Martin"></div>
          <div class="field"><label>🔧 Intervention</label><input id="d-intervention" placeholder="Embrayage"></div>
        </div>
        <div class="form-bottom" style="grid-template-columns: 1fr 280px;">
          <div class="field"><label>📌 Statut</label><select id="d-statut"><option>En attente</option><option>À relancer</option><option>Validé</option></select></div>
          <button class="primary" id="createDevisBtn">Ajouter</button>
        </div>
      </div>
      <div class="footer-note" id="devisFooter"></div>
    </section>
  </div>
  <script>
    const badgeClass = (status) => status === 'Validé' ? 'green' : status === 'À relancer' ? 'blue' : 'yellow';

    async function loadDevis() {
      const res = await fetch('/api/devis');
      const devis = await res.json();
      const rows = document.getElementById('devisRows');
      rows.innerHTML = devis.map(d => `
        <div class="row">
          <div>${escapeHtml(d.immat || '')}</div>
          <div>${escapeHtml(d.vehicule || '')}</div>
          <div>${escapeHtml(d.client || '')}</div>
          <div><span class="badge ${badgeClass(d.statut)}">${escapeHtml(d.intervention || '')}</span></div>
          <div><span class="badge ${badgeClass(d.statut)}">${escapeHtml(d.statut || '')}</span></div>
          <div>${d.commandeCreee ? '<span class="badge green">Commande créée</span>' : '<span class="badge yellow">À créer</span>'}</div>
          <div class="actions"><button class="link-btn ${d.commandeCreee ? 'success' : ''}" ${d.commandeCreee ? 'disabled' : ''} onclick="createPieceOrder('${d.id}', this)">${d.commandeCreee ? 'Déjà créée' : 'Pièce à commander'}</button></div>
        </div>`).join('');

      const attente = devis.filter(x => x.statut === 'En attente').length;
      const relance = devis.filter(x => x.statut === 'À relancer').length;
      const valide = devis.filter(x => x.statut === 'Validé').length;
      document.getElementById('devisCounters').innerHTML = `
        <div class="counter"><span class="dot yellow"></span>${attente}</div>
        <div class="counter"><span class="dot blue"></span>${relance}</div>
        <div class="counter"><span class="dot green"></span>${valide}</div>`;
      document.getElementById('devisFooter').innerHTML = `${devis.length} devis <span class="green-dot">•</span> Mise à jour en temps réel`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function createPieceOrder(id, btn) {
      btn.disabled = true;
      btn.textContent = 'Création...';
      const res = await fetch(`/api/devis/${id}/create-piece-order`, { method: 'POST' });
      const data = await res.json();
      if (!res.ok) {
        alert(data.error || 'Erreur');
        btn.disabled = false;
        btn.textContent = 'Pièce à commander';
        return;
      }
      await loadDevis();
    }
    window.createPieceOrder = createPieceOrder;

    document.getElementById('createDevisBtn').addEventListener('click', async () => {
      const payload = {
        immat: document.getElementById('d-immat').value,
        vehicule: document.getElementById('d-vehicule').value,
        client: document.getElementById('d-client').value,
        intervention: document.getElementById('d-intervention').value,
        statut: document.getElementById('d-statut').value
      };
      const res = await fetch('/api/devis', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
      });
      if (!res.ok) return alert('Erreur création devis');
      document.querySelectorAll('input').forEach(i => i.value = '');
      document.getElementById('d-statut').value = 'En attente';
      await loadDevis();
    });

    loadDevis();
  </script>
</body>
</html>
